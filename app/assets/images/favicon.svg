<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <style>
    .base { fill: rgb(249,246,243); }
    .check { fill: rgb(190,12,30); fill-opacity: 0.5; }
    @media (prefers-color-scheme: dark) {
      .base { fill: rgb(38,35,32); }
