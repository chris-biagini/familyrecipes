name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      RAILS_ENV: test
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:create db:migrate

      - name: Lint and test
        run: bundle exec rake

      - name: Verify clean migration and seed
        env:
          RAILS_ENV: production
          SECRET_KEY_BASE: placeholder
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ci-placeholder-key
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ci-placeholder-key
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ci-placeholder-salt
        run: bin/rails db:create db:migrate db:seed
