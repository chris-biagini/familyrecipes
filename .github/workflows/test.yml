name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      RAILS_ENV: test
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS
        run: npm run build

      - name: JS tests
        run: npm test

      - name: Set up database
        run: bin/rails db:create db:migrate

      - name: Lint and test
        run: bundle exec rake

      - name: Security scan (Brakeman)
        run: bundle exec brakeman --no-pager -q

      - name: Dependency audit (bundler-audit)
        run: bundle exec bundle-audit check --update

      - name: Verify clean migration and seed
        env:
          RAILS_ENV: production
          SECRET_KEY_BASE: placeholder
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ci-placeholder-key
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ci-placeholder-key
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ci-placeholder-salt
        run: bin/rails db:create db:migrate db:seed
