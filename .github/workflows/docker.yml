name: Build and Push Docker Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: REVISION=${{ steps.version.outputs.value }}
          tags: familyrecipes:smoke-test

      - name: Smoke test container
        run: |
          docker run -d --name smoke \
            -p 3030:3030 \
            -e SECRET_KEY_BASE=smoke-test-secret \
            familyrecipes:smoke-test

          echo "Waiting for /up to return 200..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3030/up > /dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed after 90s"
          docker logs smoke
          exit 1

      - name: Cleanup smoke test container
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: REVISION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Classify: vX.Y.Z = patch, vX.Y = minor, vX = major
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            TIER="patch"
          elif echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+$'; then
            TIER="minor"
          else
            TIER="major"
          fi

          {
            git log --format="- %s" --no-merges "$RANGE"
            echo ""
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          } > /tmp/release-notes.md

          DRAFT_FLAG=""
          if [ "$TIER" != "patch" ]; then
            DRAFT_FLAG="--draft"
          fi

          gh release create "$TAG" $DRAFT_FLAG --notes-file /tmp/release-notes.md
