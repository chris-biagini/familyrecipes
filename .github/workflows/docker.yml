name: Build and Push Docker Image

on:
  push:
    tags: ['v*']
  schedule:
    - cron: '0 8 * * *'  # 3 AM US-Eastern (EST; 4 AM during EDT)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - name: Check if HEAD already built
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          TAGS=$(gh api \
            "/users/${REPO_OWNER}/packages/container/${REPO_NAME}/versions" \
            --paginate --jq '.[].metadata.container.tags[]' 2>/dev/null || true)
          if echo "$TAGS" | grep -qx "$SHORT_SHA"; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Image for $SHORT_SHA already exists — skipping build"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "No image for $SHORT_SHA — will build"
          fi

  test:
    needs: check
    if: >-
      always() &&
      !cancelled() &&
      (github.event_name != 'schedule' ||
       needs.check.outputs.should_build == 'true')
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:create db:migrate

      - name: Lint and test
        run: bundle exec rake

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' }}
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
