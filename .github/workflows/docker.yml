name: Build and Push Docker Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RAILS_ENV: test
      CI: true
      RELEASE_AUDIT: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS
        run: npm run build

      - name: Set up database
        run: bin/rails db:create db:migrate

      - name: Run tests with coverage
        run: bundle exec rake test

      - name: Release audit (Tier 2)
        run: |
          bundle exec rake release:audit:coverage
          bundle exec rake release:audit:dead_code
          bundle exec rake release:audit:deps
          bundle exec rake release:audit:schema
          bundle exec rake release:audit:docs

  build-and-push:
    needs: release-audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: REVISION=${{ steps.version.outputs.value }}
          tags: mirepoix:smoke-test

      - name: Smoke test container
        run: |
          docker run -d --name smoke \
            -p 3030:3030 \
            -e SECRET_KEY_BASE=smoke-test-secret \
            mirepoix:smoke-test

          echo "Waiting for /up to return 200..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3030/up > /dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed after 90s"
          docker logs smoke
          exit 1

      # Exercises the encrypted write path (Kitchen#join_code is deterministic-
      # encrypted). The /up check above only proves the app booted â€” it doesn't
      # touch any encrypted column, so it can't catch an AR encryption wiring
      # regression. kitchen:create does.
      - name: Exec kitchen:create in smoke container
        run: |
          output=$(docker exec smoke bin/rails 'kitchen:create[Smoke Kitchen,smoke@example.com,Smoke Owner]' 2>&1)
          echo "$output"
          echo "$output" | grep -q 'Created kitchen: Smoke Kitchen' || { echo "::error::kitchen:create missing Created kitchen line"; exit 1; }
          echo "$output" | grep -q 'Join code:' || { echo "::error::kitchen:create missing Join code line (encryption wiring broken?)"; exit 1; }

      - name: Cleanup smoke test container
        if: always()
        run: docker rm -f smoke 2>/dev/null || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=v(.*),group=1
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: REVISION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Strip optional letter suffix for classification (v0.5.4a â†’ v0.5.4)
          BASE_TAG=$(echo "$TAG" | sed 's/[a-zA-Z]*$//')

          # Reject four-part tags (v0.6.8.1) â€” build the image but skip release
          if echo "$BASE_TAG" | grep -qE '^v[0-9]+(\.[0-9]+){3,}$'; then
            echo "::warning::Skipping release for unsupported tag format: $TAG"
            exit 0
          fi

          # Classify: vX.Y.Z = patch, vX.Y = minor, vX = major
          if echo "$BASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            TIER="patch"
          elif echo "$BASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+$'; then
            TIER="minor"
          elif echo "$BASE_TAG" | grep -qE '^v[0-9]+$'; then
            TIER="major"
          else
            echo "::warning::Skipping release for unrecognized tag format: $TAG"
            exit 0
          fi

          echo "Tag: $TAG (base: $BASE_TAG, tier: $TIER)"

          # Find previous tag â€” use fixed-string whole-line match to avoid regex dot bug
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fx -A1 "$TAG" | tail -1)

          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Generate commit list (cap at 100 to handle first-ever tag gracefully)
          git log --format="- %s" --no-merges -100 "$RANGE" > /tmp/release-notes.md

          # Add changelog comparison link only when a previous tag exists
          if [ "$RANGE" != "$TAG" ]; then
            echo "" >> /tmp/release-notes.md
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}" >> /tmp/release-notes.md
          fi

          gh release create "$TAG" --notes-file /tmp/release-notes.md
