name: Deploy Help Site

on:
  push:
    branches: [main]
    paths: ['docs/help/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy favicon
        run: cp app/assets/images/favicon.svg docs/help/assets/favicon.svg

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll
        run: gem install jekyll kramdown-parser-gfm

      - name: Build
        run: |
          cd /tmp
          jekyll build --source $GITHUB_WORKSPACE/docs/help --destination $GITHUB_WORKSPACE/_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
