# docker-compose.example.yml
#
# Reference configuration for deploying mirepoix.
# Optional: create a .env file for custom settings (see .env.example).
#
# Quick start:
#   1. cp docker-compose.example.yml docker-compose.yml
#   2. docker compose up -d
#
# SECRET_KEY_BASE and Active Record Encryption keys are auto-generated on
# first boot and persisted in the storage volume.
# To provide your own, create a .env file (see .env.example).

services:
  app:
    image: ghcr.io/chris-biagini/mirepoix:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      # RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      # USDA_API_KEY: ${USDA_API_KEY:-}
    volumes:
      # Named volume (default — works everywhere, managed by Docker):
      - app_storage:/app/storage
      # Bind mount alternative (if you have an appdata convention for backups):
      # - /path/to/mirepoix/storage:/app/storage
      #
      # Site configuration (title, subtitle, etc.) lives in storage/site.yml.
      # A default is created on first boot; edit it to customize your instance.

volumes:
  app_storage:
